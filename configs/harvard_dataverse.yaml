pipeline:
  id: "harvard_dataverse_seed_v1"
  run_mode: "incremental"
  max_items: 500000
  phases: ["metadata", "download"]

source:
  name: "harvard-dataverse"
  type: "rest_api"
  base_url: "https://dataverse.harvard.edu/api"
  repository_id: 10
  repository_url: "https://dataverse.harvard.edu"
  endpoints:
    search: "/search"
    files: "/datasets/:persistentId/versions/:latest/files"
  params:
    per_page: 10
  search_strategy:
    extension_queries:
      # REFI-QDA Standard
      - "qdpx"
      - "qdc"
      # MAXQDA
      - "mqda"
      - "mqbac"
      - "mqtc"
      - "mqex"
      - "mqmtr"
      - "mx24"
      - "mx24bac"
      - "mc24"
      - "mex24"
      - "mx22"
      - "mex22"
      - "mx20"
      - "mx18"
      - "mx12"
      - "mx11"
      - "mx5"
      - "mx4"
      - "mx3"
      - "mx2"
      - "m2k"
      - "loa"
      - "sea"
      - "mtr"
      - "mod"
      # NVivo
      - "nvp"
      - "nvpx"
      # ATLAS.ti
      - "atlasproj"
      - "hpr7"
      # QDA Miner
      - "ppj"
      - "pprj"
      - "qlt"
      # f4analyse
      - "f4p"
      # Quirkos
      - "qpd"
    natural_language_queries:
      - "qdpx"
      - "mqda"
      - "interview study"
      - "qualitative research dataset"
      - "qualitative data analysis"
      - "thematic analysis"
      - "grounded theory"
      - "focus group transcript"
      - "ethnographic data"
      - "coding framework"
      - "qualitative coding"
      - "narrative analysis"
      - "phenomenological study"

auth:
  type: "api_key"
  env:
    api_key: "DATAVERSE_API_TOKEN"
  placement: "header"
  header_name: "X-Dataverse-key"

extractor:
  name: "harvard_dataverse_extractor"
  options:
    include_files: true
    per_page: 10
    max_pages: 10000

pre_transforms:
  - name: "validate_required_fields"
    options:
      required_fields: ["source_url"]
  - name: "normalize_fields"
  - name: "deduplicate_assets"
  - name: "slugify_dataset"

post_transforms:
  - name: "classify_qda_files"

storage:
  downloads_root: "./downloads"
  layout: "{source_name}/{dataset_slug}/{version}/"
  checksum: "sha256"

sink:
  type: "sqlite"
  options:
    path: "./metadata/qdarchive.sqlite"

logging:
  level: "INFO"
  console:
    enabled: true
    rich: true
  file:
    enabled: true
    path: "./logs/qdarchive.log"
