pipeline:
  id: "zenodo_seed_v1"
  run_mode: "incremental"
  max_items: 500

source:
  name: "zenodo"
  type: "rest_api"
  base_url: "https://zenodo.org/api"
  endpoints:
    search: "/records"
  params:
    q: 'resource_type.type:dataset AND (filetype:qdpx OR filetype:qdc OR filetype:mqda OR filetype:mqbac OR filetype:mqtc OR filetype:mqex OR filetype:mqmtr OR filetype:mx24 OR filetype:mx24bac OR filetype:mc24 OR filetype:mex24 OR filetype:mx22 OR filetype:mex22 OR filetype:mx20 OR filetype:mx18 OR filetype:mx12 OR filetype:mx11 OR filetype:mx5 OR filetype:mx4 OR filetype:m2k OR filetype:nvp OR filetype:nvpx OR filetype:atlasproj OR filetype:hpr7 OR filetype:ppj OR filetype:pprj OR filetype:qlt OR filetype:f4p OR filetype:qpd)'
    size: 25
  pagination:
    type: "page"
    page_param: "page"
    size_param: "size"

auth:
  type: "bearer"
  env:
    token: "ZENODO_TOKEN"

extractor:
  name: "zenodo_extractor"
  options:
    include_files: true

pre_transforms:
  - name: "validate_required_fields"
    options:
      required_fields: ["source_url", "has_assets"]
  - name: "normalize_fields"
  - name: "deduplicate_assets"
  - name: "filter_by_extensions"
    options:
      categories: ["analysis_data"]
  - name: "slugify_dataset"

post_transforms:
  - name: "classify_qda_files"

storage:
  downloads_root: "./downloads"
  layout: "{source_name}/{dataset_slug}/"
  checksum: "sha256"

sink:
  type: "sqlite"
  options:
    path: "./metadata/qdarchive.sqlite"

logging:
  level: "INFO"
  console:
    enabled: true
    rich: true
  file:
    enabled: true
    path: "./logs/qdarchive.log"
