    header_name: "X-Dataverse-key"
  www.openicpsr.org:
    type: "browser_session"
    browser: "chromium"
  www.icpsr.umich.edu:
    type: "browser_session"
    browser: "chromium"

extractor:
  name: "harvard_dataverse_extractor"
  options:
    include_files: true
    per_page: 100
    max_pages: 10000

pre_transforms:
  - name: "validate_required_fields"
    options:
      required_fields: ["source_url"]
  - name: "normalize_fields"
  - name: "deduplicate_assets"
  - name: "slugify_dataset"
  - name: "filter_by_extensions"
    options:
      categories: ["all"]

post_transforms:
  - name: "classify_qda_files"

storage:
  downloads_root: "./downloads"
  layout: "{source_name}/{dataset_slug}/{version}/"
  checksum: "sha256"
  max_dataset_size_gb: 1.0

sink:
  type: "sqlite"
  options:
    path: "./metadata/qdarchive.sqlite"

http:
  timeout_seconds: 15
  max_retries: 5
  rate_limit_per_second: 2

logging:
  level: "INFO"
  console:
    enabled: true
    rich: true
  file:
    enabled: true
    path: "./logs/qdarchive.log"
