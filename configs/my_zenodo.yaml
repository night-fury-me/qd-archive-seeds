pipeline:
  id: "zenodo_seed_v2"
  run_mode: "incremental"
  phases: ["metadata", "download"]

source:
  name: "zenodo"
  type: "rest_api"
  base_url: "https://zenodo.org/api"
  repository_id: 1
  repository_url: "https://zenodo.org"
  endpoints:
    search: "/records"
  params:
    size: 100
  pagination:
    type: "page"
    page_param: "page"
    size_param: "size"
  search_strategy:
    base_query_prefix: "resource_type.type:dataset AND"
    facet_filters:
      type: "dataset"
    extension_queries:
      # REFI-QDA Standard
      - "qdpx"
      - "qdc"
      # MAXQDA
      - "mqda"
      - "mqbac"
      - "mqtc"
      - "mqex"
      - "mqmtr"
      - "mx24"
      - "mx24bac"
      - "mc24"
      - "mex24"
      - "mx22"
      - "mex22"
      - "mx20"
      - "mx18"
      - "mx12"
      - "mx11"
      - "mx5"
      - "mx4"
      - "mx3"
      - "mx2"
      - "m2k"
      - "loa"
      - "sea"
      - "mtr"
      - "mod"
      # NVivo
      - "nvp"
      - "nvpx"
      # ATLAS.ti
      - "atlasproj"
      - "hpr7"
      # QDA Miner
      - "ppj"
      - "pprj"
      - "qlt"
      # f4analyse
      - "f4p"
      # Quirkos
      - "qpd"
    natural_language_queries:
      - "qdpx"
      - "mqda"
      - "interview study"
      - "qualitative research dataset"
      - "qualitative data analysis"
      - "thematic analysis"
      - "grounded theory"
      - "focus group transcript"
      - "ethnographic data"
      - "coding framework"
      - "qualitative coding"
      - "narrative analysis"
      - "phenomenological study"

auth:
  type: "bearer"
  env:
    token: "ZENODO_TOKEN"

extractor:
  name: "zenodo_extractor"
  options:
    include_files: true
    max_pages: 100
    ext_batch_size: 10
    nl_batch_size: 2
    auto_date_split: true

pre_transforms:
  - name: "validate_required_fields"
    options:
      required_fields: ["source_url"]
  - name: "normalize_fields"
  - name: "deduplicate_assets"
  - name: "slugify_dataset"

post_transforms:
  - name: "classify_qda_files"

storage:
  downloads_root: "./downloads"
  layout: "{source_name}/{dataset_slug}/{version}/"
  checksum: "sha256"

sink:
  type: "sqlite"
  options:
    path: "./metadata/qdarchive.sqlite"

http:
  timeout_seconds: 15
  max_retries: 3
  rate_limit_per_second: 0.4  # Stay under Zenodo's 30 req/min limit

logging:
  level: "INFO"
  console:
    enabled: true
    rich: true
  file:
    enabled: true
    path: "./logs/qdarchive.log"
