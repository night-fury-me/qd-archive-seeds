pipeline:
  id: "harvard_dataverse_seed_v1"
  run_mode: "incremental"
  max_items: 500000
  phases: ["metadata", "download"]

source:
  name: "harvard-dataverse"
  type: "rest_api"
  base_url: "https://dataverse.harvard.edu/api"
  repository_id: 10
  repository_url: "https://dataverse.harvard.edu"
  endpoints:
    search: "/search"
    files: "/datasets/:persistentId/versions/:latest/files"
  params: {}
  search_strategy:
    extension_queries:
      # REFI-QDA Standard
      - "qdpx"
      - "qdc"
      # MAXQDA (most formats return 0 on Dataverse, keep for completeness)
      - "mqda"
      - "mx24"
      - "mx22"
      - "mx20"
      - "mx18"
      - "mx12"
      # NVivo
      - "nvp"
      - "nvpx"
      # ATLAS.ti
      - "atlasproj"
      - "hpr7"
      # QDA Miner
      - "ppj"
      - "pprj"
      # f4analyse
      - "f4p"
      # Quirkos
      - "qpd"
    natural_language_queries:
      # QDA tool names (~280 results, highly relevant)
      - "NVivo"
      - "ATLAS.ti"
      - "MAXQDA"
      - "Dedoose"
      - "REFI-QDA"
      # QDA tool + project files (~7 results, very precise)
      - '"NVivo project"'
      - '"ATLAS.ti project"'
      # Methodology — exact phrases (moderate counts, relevant)
      - '"qualitative interview"'
      - '"semi-structured interview"'
      - '"interview transcript"'
      - '"focus group transcript"'
      - '"thematic analysis"'
      - '"grounded theory"'
      - '"qualitative coding"'
      - '"qualitative codebook"'
      - '"coded transcript"'
      - '"phenomenological study"'
      - '"narrative analysis"'
      - '"discourse analysis"'
      - '"content analysis"'
      - '"qualitative data analysis"'
      - '"qualitative research"'
      # Data-focused phrases
      - '"focus group data"'
      - '"qualitative dataset"'
      - '"coding scheme"'
      - '"interview data"'
      - "ethnographic fieldnotes"

auth:
  type: "api_key"
  env:
    api_key: "HARVARD_DATAVERSE_TOKEN"
  placement: "header"
  header_name: "X-Dataverse-key"

extractor:
  name: "harvard_dataverse_extractor"
  options:
    include_files: true
    per_page: 100
    max_pages: 10000

pre_transforms:
  - name: "validate_required_fields"
    options:
      required_fields: ["source_url"]
  - name: "normalize_fields"
  - name: "deduplicate_assets"
  - name: "slugify_dataset"

post_transforms:
  - name: "classify_qda_files"

storage:
  downloads_root: "./downloads"
  layout: "{source_name}/{dataset_slug}/{version}/"
  checksum: "sha256"

sink:
  type: "sqlite"
  options:
    path: "./metadata/qdarchive.sqlite"

http:
  timeout_seconds: 15
  max_retries: 5
  rate_limit_per_second: 0.5

logging:
  level: "INFO"
  console:
    enabled: true
    rich: true
  file:
    enabled: true
    path: "./logs/qdarchive.log"
