pipeline:
  id: "harvard_dataverse_seed_v1"
  run_mode: "incremental"
  max_items: 500000
  phases: ["metadata", "download"]

source:
  name: "harvard-dataverse"
  type: "rest_api"
  base_url: "https://dataverse.harvard.edu/api"
  repository_id: 10
  repository_url: "https://dataverse.harvard.edu"
  endpoints:
    search: "/search"
    files: "/datasets/:persistentId/versions/:latest/files"
  params: {}
  search_strategy:
    extension_queries:
      # REFI-QDA Standard
      - "qdpx"
      - "qdc"
      # MAXQDA (most formats return 0 on Dataverse, keep for completeness)
      - "mqda"
      - "mx24"
      - "mx22"
      - "mx20"
      - "mx18"
      - "mx12"
      # NVivo
      - "nvp"
      - "nvpx"
      # ATLAS.ti
      - "atlasproj"
      - "hpr7"
      # QDA Miner
      - "ppj"
      - "pprj"
      # f4analyse
      - "f4p"
      # Quirkos
      - "qpd"
    natural_language_queries:
      # ── QDA tool names (~280 unique, highest relevance) ──
      - "NVivo"
      - "ATLAS.ti"
      - "MAXQDA"
      - "Dedoose"
      - "REFI-QDA"
      - "HyperRESEARCH"
      - '"NVivo project"'
      - '"ATLAS.ti project"'
      # ── Core qualitative methodology (~2,200 unique) ──
      - '"qualitative interview"'
      - '"semi-structured interview"'
      - '"structured interview"'
      - '"unstructured interview"'
      - '"in-depth interview"'
      - '"key informant interview"'
      - '"key informant"'
      - '"expert interview"'
      - '"stakeholder interview"'
      - '"elite interview"'
      - '"narrative interview"'
      - '"interview transcript"'
      - '"interview transcripts"'
      - '"interview data"'
      - '"interview guide"'
      - '"interview schedule"'
      # ── Focus groups (~1,400 unique) ──
      - '"focus group"'
      - '"focus group transcript"'
      - '"focus group transcripts"'
      - '"focus group data"'
      - '"focus group discussion"'
      - '"discussion guide"'
      - '"topic guide"'
      # ── Analysis methods (~800 unique) ──
      - '"thematic analysis"'
      - '"thematic coding"'
      - '"grounded theory"'
      - '"content analysis"'
      - '"discourse analysis"'
      - '"narrative analysis"'
      - '"conversation analysis"'
      - '"text analysis"'
      - '"document analysis"'
      - '"textual analysis"'
      - '"framework analysis"'
      - '"interpretive analysis"'
      - '"qualitative data analysis"'
      - '"qualitative analysis"'
      - '"qualitative coding"'
      - '"qualitative codebook"'
      - '"coded transcript"'
      - '"coding scheme"'
      - '"code book"'
      - '"inductive coding"'
      - '"deductive coding"'
      - '"hermeneutic"'
      # ── Ethnography & fieldwork (~1,400 unique) ──
      - '"ethnographic"'
      - '"ethnography"'
      - '"autoethnography"'
      - "ethnographic fieldnotes"
      - '"field notes"'
      - '"fieldwork"'
      - '"field research"'
      - '"participant observation"'
      - '"observation notes"'
      # ── Broader qualitative research (~2,800 unique) ──
      - '"qualitative research"'
      - '"qualitative study"'
      - '"qualitative methods"'
      - '"qualitative approach"'
      - '"qualitative evidence"'
      - '"qualitative findings"'
      - '"qualitative data"'
      - '"qualitative dataset"'
      - '"phenomenological study"'
      - '"mixed methods"'
      - '"action research"'
      - '"participatory research"'
      - '"case study"'
      - '"life history"'
      - '"oral history"'
      - '"community research"'
      - '"nursing research"'
      - '"education research"'
      - '"reflexive"'
      # ── Data collection & sampling (~2,500 unique) ──
      - '"open-ended responses"'
      - '"survey responses"'
      - '"audio recording"'
      - '"video recording"'
      - '"informed consent"'
      - '"research journal"'
      - '"supplementary data"'
      - '"supplementary material"'
      - '"purposive sampling"'
      - '"snowball sampling"'
      - '"convenience sampling"'
      - '"saturation"'
      - '"data saturation"'
      - '"member checking"'
      - '"theoretical sampling"'
      - '"constant comparison"'

auth:
  type: "api_key"
  env:
    api_key: "HARVARD_DATAVERSE_TOKEN"
  placement: "header"
  header_name: "X-Dataverse-key"

extractor:
  name: "harvard_dataverse_extractor"
  options:
    include_files: true
    per_page: 100
    max_pages: 10000

pre_transforms:
  - name: "validate_required_fields"
    options:
      required_fields: ["source_url"]
  - name: "normalize_fields"
  - name: "deduplicate_assets"
  - name: "slugify_dataset"

post_transforms:
  - name: "classify_qda_files"

storage:
  downloads_root: "./downloads"
  layout: "{source_name}/{dataset_slug}/{version}/"
  checksum: "sha256"

sink:
  type: "sqlite"
  options:
    path: "./metadata/qdarchive.sqlite"

http:
  timeout_seconds: 15
  max_retries: 5
  rate_limit_per_second: 0.5

logging:
  level: "INFO"
  console:
    enabled: true
    rich: true
  file:
    enabled: true
    path: "./logs/qdarchive.log"
