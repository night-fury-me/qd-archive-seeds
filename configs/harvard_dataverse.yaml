# ═══════════════════════════════════════════════════════════════════════
# Pipeline Settings
# ═══════════════════════════════════════════════════════════════════════
# id:        Unique identifier for this pipeline run
# run_mode:  "incremental" (resume from last run) | "full" (start fresh)
# max_items: Max datasets to collect (null = unlimited)
# phases:    Which phases to run — ["metadata"] | ["download"] | ["metadata", "download"]
pipeline:
  id: "harvard_dataverse_seed_v1"
  run_mode: "incremental"
  max_items: 500000
  phases: ["metadata", "download"]

# ═══════════════════════════════════════════════════════════════════════
# Source Configuration
# ═══════════════════════════════════════════════════════════════════════
# name:           Source identifier used in folder naming and DB records
# type:           "rest_api" | "html" | "static_list"
# base_url:       API base URL
# repository_id:  Numeric ID for this repository (for resume/dedup support)
# repository_url: Public URL of the repository
# endpoints:      API endpoint paths (relative to base_url)
#   search: Search API endpoint
#   files:  Dataset files API endpoint (:persistentId is a literal path token)
# params:         Default query parameters sent with every request
# search_strategy:
#   base_query_prefix:       Prepended to extension queries
#   facet_filters:           Extra API params applied to all queries
#                            For Dataverse: fq supports subject_ss, dateSort, license filters
#                            Subject values: "Agricultural Sciences", "Arts and Humanities",
#                              "Astronomy and Astrophysics", "Business and Management",
#                              "Engineering", "Law", "Medicine, Health and Life Sciences",
#                              "Social Sciences"
#   extension_queries:       File extension search terms
#   natural_language_queries: Free-text search terms
source:
  name: "harvard-dataverse"
  type: "rest_api"
  base_url: "https://dataverse.harvard.edu/api"
  repository_id: 10
  repository_url: "https://dataverse.harvard.edu"
  endpoints:
    search: "/search"
    files: "/datasets/:persistentId/versions/:latest/files"
  params: {}
  search_strategy:
    # facet_filters:
    #   fq: 'subject_ss:"Social Sciences" OR subject_ss:"Arts and Humanities"'
    extension_queries:
      # REFI-QDA Standard
      - "qdpx"
      - "qdc"
      # MAXQDA (most formats return 0 on Dataverse, keep for completeness)
      - "mqda"
      - "mx24"
      - "mx22"
      - "mx20"
      - "mx18"
      - "mx12"
      # NVivo
      - "nvp"
      - "nvpx"
      # ATLAS.ti
      - "atlasproj"
      - "hpr7"
      # QDA Miner
      - "ppj"
      - "pprj"
      # f4analyse
      - "f4p"
      # Quirkos
      - "qpd"
    natural_language_queries:
      # ── Tier 1: QDA tool names (highest precision) ──
      - "NVivo"
      - "ATLAS.ti"
      - "MAXQDA"
      - "Dedoose"
      - "REFI-QDA"
      - "HyperRESEARCH"
      # ── Tier 2: Core qualitative data types (high precision) ──
      - '"interview transcript"'
      - '"focus group transcript"'
      - '"qualitative interview"'
      - '"semi-structured interview"'
      # ── Tier 3: Analysis methods (moderate precision) ──
      - '"thematic analysis"'
      - '"grounded theory"'
      - '"qualitative data analysis"'
      - '"qualitative coding"'
      # ── Tier 4: Broader (safe with fq subject filter) ──
      - '"ethnographic data"'

# ═══════════════════════════════════════════════════════════════════════
# Authentication
# ═══════════════════════════════════════════════════════════════════════
# type: "bearer" | "api_key" | "browser_session"
# env:  Environment variable names for credentials
# placement: "header" | "query" — where to place the API key
# header_name: HTTP header name for api_key auth
auth:
  type: "api_key"
  env:
    api_key: "HARVARD_DATAVERSE_TOKEN"
  placement: "header"
  header_name: "X-Dataverse-key"

